# =============================================================================
# ELITE FRONTEND CI PIPELINE - BIZRA Node0 Genesis
# =============================================================================
# World-class CI/CD pipeline implementing DevOps Body of Knowledge practices:
# - Matrix testing across Node versions
# - Smart caching with dependency fingerprinting
# - Parallel job execution with intelligent dependencies
# - Quality gates with enforcing thresholds
# - Performance regression detection
# - Security scanning with SARIF integration
# =============================================================================

name: Elite Frontend CI

on:
  # Disabled auto-trigger — consolidated into ci.yml
  # push:
  #   branches: [main, develop, 'release/**', 'feature/**']
  # pull_request:
  #   branches: [main, develop]
  #   types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:
    inputs:
      skip_e2e:
        description: 'Skip E2E tests'
        type: boolean
        default: false
      force_deploy:
        description: 'Force deployment even if checks pass'
        type: boolean
        default: false

# =============================================================================
# ENVIRONMENT CONFIGURATION
# =============================================================================
env:
  NODE_VERSION: '20'
  PNPM_VERSION: '10'
  # Quality thresholds
  COVERAGE_THRESHOLD: 80
  BUNDLE_SIZE_LIMIT_KB: 300
  LIGHTHOUSE_PERF_THRESHOLD: 85
  # Build optimization
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}

# Prevent concurrent runs on same ref
concurrency:
  group: elite-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# =============================================================================
# JOB DEFINITIONS
# =============================================================================
jobs:
  # ===========================================================================
  # STAGE 0: CHANGE DETECTION & METADATA
  # ===========================================================================
  changes:
    name: 🔍 Detect Changes
    runs-on: ubuntu-latest
    outputs:
      src: ${{ steps.filter.outputs.src }}
      tests: ${{ steps.filter.outputs.tests }}
      deps: ${{ steps.filter.outputs.deps }}
      config: ${{ steps.filter.outputs.config }}
      docs_only: ${{ steps.filter.outputs.docs_only }}
    steps:
      - uses: actions/checkout@v4
      
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            src:
              - 'app/**'
              - 'components/**'
              - 'lib/**'
              - 'store/**'
              - 'hooks/**'
              - 'styles/**'
            tests:
              - 'tests/**'
              - '**/*.test.ts'
              - '**/*.spec.ts'
            deps:
              - 'package.json'
              - 'pnpm-lock.yaml'
            config:
              - 'next.config.mjs'
              - 'tsconfig.json'
              - 'tailwind.config.*'
              - 'vitest.config.ts'
              - 'playwright.config.ts'
            docs_only:
              - '**/*.md'
              - 'docs/**'

  # ===========================================================================
  # STAGE 1: INSTALL & CACHE
  # ===========================================================================
  setup:
    name: 📦 Setup & Cache
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.docs_only != 'true' || github.event_name == 'workflow_dispatch'
    outputs:
      cache-key: ${{ steps.cache-key.outputs.key }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate Cache Key
        id: cache-key
        run: |
          echo "key=pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}" >> $GITHUB_OUTPUT

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Dependencies
        uses: actions/cache/save@v4
        with:
          path: |
            node_modules
            ~/.pnpm-store
          key: ${{ steps.cache-key.outputs.key }}

  # ===========================================================================
  # STAGE 2: LINT & TYPE CHECK (Parallel)
  # ===========================================================================
  lint:
    name: 🔬 Lint & Format
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Restore Cache
        uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            ~/.pnpm-store
          key: ${{ needs.setup.outputs.cache-key }}

      - name: Run ESLint
        run: pnpm lint --max-warnings 0
        continue-on-error: false

      - name: Check TypeScript
        run: pnpm exec tsc --noEmit --incremental false

  # ===========================================================================
  # STAGE 3: UNIT TESTS WITH COVERAGE
  # ===========================================================================
  unit-tests:
    name: 🧪 Unit Tests
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Restore Cache
        uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            ~/.pnpm-store
          key: ${{ needs.setup.outputs.cache-key }}

      - name: Run Unit Tests
        run: pnpm test:unit --coverage --reporter=verbose

      - name: Check Coverage Threshold
        run: |
          COVERAGE=$(node -e "
            const report = require('./coverage/coverage-summary.json');
            console.log(Math.round(report.total.lines.pct));
          " 2>/dev/null || echo "0")
          
          echo "Coverage: ${COVERAGE}%"
          echo "Threshold: ${{ env.COVERAGE_THRESHOLD }}%"
          
          if [ "$COVERAGE" -lt "${{ env.COVERAGE_THRESHOLD }}" ]; then
            echo "❌ Coverage ${COVERAGE}% is below threshold ${{ env.COVERAGE_THRESHOLD }}%"
            exit 1
          fi
          echo "✅ Coverage meets threshold"

      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

      - name: Coverage Summary
        if: always()
        run: |
          echo "## 🧪 Unit Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f coverage/coverage-summary.json ]; then
            node -e "
              const report = require('./coverage/coverage-summary.json');
              const total = report.total;
              console.log('| Metric | Coverage |');
              console.log('|--------|----------|');
              console.log('| Lines | ' + total.lines.pct.toFixed(2) + '% |');
              console.log('| Statements | ' + total.statements.pct.toFixed(2) + '% |');
              console.log('| Functions | ' + total.functions.pct.toFixed(2) + '% |');
              console.log('| Branches | ' + total.branches.pct.toFixed(2) + '% |');
            " >> $GITHUB_STEP_SUMMARY
          fi

  # ===========================================================================
  # STAGE 4: E2E TESTS (Matrix: Chrome, Firefox)
  # ===========================================================================
  e2e-tests:
    name: 🎭 E2E Tests (${{ matrix.browser }})
    runs-on: ubuntu-latest
    needs: [setup, lint]
    if: github.event.inputs.skip_e2e != 'true'
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox]
        shard: [1, 2]
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Restore Cache
        uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            ~/.pnpm-store
          key: ${{ needs.setup.outputs.cache-key }}

      - name: Install Playwright Browser
        run: pnpm exec playwright install --with-deps ${{ matrix.browser }}

      - name: Build Application
        run: pnpm build

      - name: Run E2E Tests
        run: |
          pnpm test:e2e --project=${{ matrix.browser }} --shard=${{ matrix.shard }}/2
        env:
          CI: true

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-${{ matrix.browser }}-shard-${{ matrix.shard }}
          path: playwright-report/
          retention-days: 14

  # ===========================================================================
  # STAGE 5: PRODUCTION BUILD & BUNDLE ANALYSIS
  # ===========================================================================
  build:
    name: 🏗️ Production Build
    runs-on: ubuntu-latest
    needs: [lint, unit-tests]
    outputs:
      bundle-size: ${{ steps.bundle.outputs.size }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Restore Cache
        uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            ~/.pnpm-store
          key: ${{ needs.setup.outputs.cache-key }}

      - name: Build Production
        run: pnpm build
        env:
          NODE_ENV: production

      - name: Analyze Bundle
        id: bundle
        run: |
          # Calculate main bundle size (gzipped)
          MAIN_BUNDLE=$(find .next/static/chunks -name "main-*.js" 2>/dev/null | head -1)
          if [ -n "$MAIN_BUNDLE" ]; then
            SIZE_BYTES=$(gzip -c "$MAIN_BUNDLE" | wc -c)
            SIZE_KB=$((SIZE_BYTES / 1024))
            echo "size=$SIZE_KB" >> $GITHUB_OUTPUT
            echo "Main bundle: ${SIZE_KB}kb (gzipped)"
            
            # Enforce budget
            if [ "$SIZE_KB" -gt "${{ env.BUNDLE_SIZE_LIMIT_KB }}" ]; then
              echo "❌ Bundle size ${SIZE_KB}kb exceeds limit ${{ env.BUNDLE_SIZE_LIMIT_KB }}kb"
              exit 1
            fi
            echo "✅ Bundle within budget"
          else
            echo "size=0" >> $GITHUB_OUTPUT
            echo "⚠️ Could not find main bundle"
          fi

      - name: Build Summary
        run: |
          echo "## 🏗️ Build Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value | Limit | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Main Bundle | ${{ steps.bundle.outputs.size }}kb | ${{ env.BUNDLE_SIZE_LIMIT_KB }}kb | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Page Sizes" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          du -sh .next/ >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: production-build
          path: |
            .next/
            !.next/cache/
          retention-days: 7

  # ===========================================================================
  # STAGE 6: LIGHTHOUSE PERFORMANCE AUDIT
  # ===========================================================================
  lighthouse:
    name: ⚡ Lighthouse Audit
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Download Build
        uses: actions/download-artifact@v4
        with:
          name: production-build
          path: .next/

      - name: Restore Dependencies
        uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            ~/.pnpm-store
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Dependencies (if needed)
        run: pnpm install --frozen-lockfile

      - name: Run Lighthouse CI
        run: |
          npm install -g @lhci/cli@0.13.x
          lhci autorun || true  # Don't fail on Lighthouse issues
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

      - name: Check Performance Threshold
        run: |
          if [ -f .lighthouseci/lhr-*.json ]; then
            PERF_SCORE=$(node -e "
              const fs = require('fs');
              const files = fs.readdirSync('.lighthouseci').filter(f => f.startsWith('lhr-'));
              if (files.length > 0) {
                const report = JSON.parse(fs.readFileSync('.lighthouseci/' + files[0]));
                console.log(Math.round(report.categories.performance.score * 100));
              } else {
                console.log('0');
              }
            ")
            
            echo "Lighthouse Performance Score: ${PERF_SCORE}"
            
            if [ "$PERF_SCORE" -lt "${{ env.LIGHTHOUSE_PERF_THRESHOLD }}" ]; then
              echo "⚠️ Performance ${PERF_SCORE} below threshold ${{ env.LIGHTHOUSE_PERF_THRESHOLD }}"
              # Warning but don't fail
            fi
          fi

      - name: Upload Lighthouse Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lighthouse-report
          path: .lighthouseci/
          retention-days: 14

  # ===========================================================================
  # STAGE 7: SECURITY SCANNING
  # ===========================================================================
  security:
    name: 🔒 Security Scan
    runs-on: ubuntu-latest
    needs: setup
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Restore Cache
        uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            ~/.pnpm-store
          key: ${{ needs.setup.outputs.cache-key }}

      - name: Dependency Audit
        run: pnpm audit --audit-level high

      - name: Trivy Vulnerability Scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true

      - name: Upload Trivy Results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Gitleaks Secret Scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          path: '.'
          format: 'cyclonedx-json'
          output-file: 'sbom.json'

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.json
          retention-days: 30

  # ===========================================================================
  # STAGE 8: QUALITY GATE
  # ===========================================================================
  quality-gate:
    name: 🚦 Quality Gate
    runs-on: ubuntu-latest
    needs: [lint, unit-tests, build, security]
    if: always()
    steps:
      - name: Check Quality Gate
        run: |
          echo "## 🚦 Quality Gate Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          
          FAILED=0
          
          # Check each required job
          if [ "${{ needs.lint.result }}" != "success" ]; then
            echo "| Lint & Type Check | ❌ Failed |" >> $GITHUB_STEP_SUMMARY
            FAILED=1
          else
            echo "| Lint & Type Check | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ "${{ needs.unit-tests.result }}" != "success" ]; then
            echo "| Unit Tests | ❌ Failed |" >> $GITHUB_STEP_SUMMARY
            FAILED=1
          else
            echo "| Unit Tests | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ "${{ needs.build.result }}" != "success" ]; then
            echo "| Production Build | ❌ Failed |" >> $GITHUB_STEP_SUMMARY
            FAILED=1
          else
            echo "| Production Build | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ "${{ needs.security.result }}" != "success" ]; then
            echo "| Security Scan | ❌ Failed |" >> $GITHUB_STEP_SUMMARY
            FAILED=1
          else
            echo "| Security Scan | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ $FAILED -eq 1 ]; then
            echo "### ❌ Quality Gate FAILED" >> $GITHUB_STEP_SUMMARY
            exit 1
          else
            echo "### ✅ Quality Gate PASSED" >> $GITHUB_STEP_SUMMARY
          fi

  # ===========================================================================
  # STAGE 9: DEPLOYMENT READINESS
  # ===========================================================================
  deploy-ready:
    name: 🚀 Deploy Ready
    runs-on: ubuntu-latest
    needs: [quality-gate, lighthouse, e2e-tests]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      url: https://bizra-genesis.app
    steps:
      - name: Deployment Summary
        run: |
          echo "## 🚀 Deployment Readiness" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "All quality gates passed. Ready for deployment." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**Triggered by:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
