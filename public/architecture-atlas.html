    <style>
        /* Sacred Geometry System - φ = 1.618034 */
        :root {
            /* Fibonacci Sequence Spacing */
            --phi: 1.618034;
            --space-1: 8px;      /* F(6) */
            --space-2: 13px;     /* F(7) = 8 × φ */
            --space-3: 21px;     /* F(8) = 13 × φ */
            --space-5: 34px;     /* F(9) = 21 × φ */
            --space-8: 55px;     /* F(10) = 34 × φ */
            --sidebar-width: 320px;

            /* Typography Scale (Musical Intervals) */
            --text-xs: 10px;     /* Minor Third */
            --text-sm: 12px;     /* Major Third */
            
            /* Color Palette - Ihsān Aligned */
            --intention-green: #4CAF50;    /* 30% weight */
            --excellence-blue: #2196F3;    /* 25% weight */
            --benefit-orange: #FF9800;     /* 30% weight */
            --growth-purple: #9C27B0;      /* 15% weight */
        }

        body {
            background-color: #050B14;
            color: #F8F6F1;
            overflow: hidden;
        }

        /* Applied Sacred Spacing */
        .nav-item {
            padding: var(--space-2) var(--space-3);
            margin-bottom: 4px;
            transition: all 0.3s ease;
            border-left: 2px solid transparent;
        }
        .nav-item:hover {
            background: rgba(201, 169, 98, 0.05);
            color: #fff;
        }
        .nav-item.active {
            background: rgba(201, 169, 98, 0.1);
            border-left-color: #C9A962;
            color: #C9A962;
        }

        .glass-panel {
            width: var(--sidebar-width);
            background: rgba(10, 22, 40, 0.6);
            backdrop-filter: blur(12px);
            border-right: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* Custom Scrollbar */
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-track { background: #0A1628; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }
        .custom-scroll::-webkit-scrollbar-thumb:hover { background: #C9A962; }

        .diagram-container {
            background-image: 
                linear-gradient(rgba(201, 169, 98, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(201, 169, 98, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        /* Enhanced Loader Animation */
        @keyframes pulse-ring {
            0%, 100% { transform: scale(1); opacity: 0.6; }
            50% { transform: scale(1.2); opacity: 0.3; }
        }
        .loader-ring::before {
            content: '';
            position: absolute;
            inset: -8px;
            border: 1px solid #C9A962;
            border-radius: 50%;
            opacity: 0.3;
            animation: pulse-ring 2s ease-in-out infinite;
        }

        /* Diagram Fade-in Animation */
        @keyframes diagram-enter {
            from { opacity: 0; transform: scale(0.95) translateY(10px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
        #mermaid-output {
            animation: diagram-enter 0.5s ease-out;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            will-change: transform;
        }

        /* Mobile Responsive Styles */
        @media (max-width: 768px) {
            aside {
                position: fixed;
                left: -320px;
                transition: left 0.3s ease;
                z-index: 100;
                height: 100%;
            }
            aside.mobile-open { left: 0; }
            #mobile-menu-btn { display: flex; }
            #mobile-overlay.active { display: block; }
            main { margin-left: 0 !important; width: 100vw; }
            .diagram-container { padding-top: 60px; }
        }

        #mobile-menu-btn {
            display: none;
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 50;
            width: 40px;
            height: 40px;
            border-radius: 8px;
            background: rgba(10, 22, 40, 0.9);
            border: 1px solid rgba(201, 169, 98, 0.3);
            color: #C9A962;
            backdrop-filter: blur(12px);
            align-items: center;
            justify-content: center;
        }

        #mobile-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 90;
            backdrop-filter: blur(2px);
        }

        /* Print Styles */
        @media print {
            aside, .absolute.top-0, #mobile-menu-btn, #loader { display: none !important; }
            main { width: 100%; margin: 0; padding: 0; background: white !important; color: black !important; overflow: visible; }
            body { background: white !important; overflow: visible; }
            #mermaid-output svg { max-width: 100%; height: auto; page-break-inside: avoid; }
            .diagram-container { background: none; }
            /* Add title for print */
            main::before {
                content: attr(data-diagram-title);
                display: block;
                font-size: 24pt;
                font-family: serif;
                font-weight: bold;
                margin-bottom: 20px;
                color: #000;
                text-align: center;
            }
        }
    </style>

    <script>
        // === 1. CANONICAL DATA ===
        const diagrams = {
            d0: { title: "BIZRA Ecosystem Overview", desc: "The high-level picture: Humans, PAT, SAT, and Core Services.", code: `flowchart LR\nsubgraph H[Humans & Devices]\nU[User<br/>Human NodeN]\nD[Devices<br/>PC, Phone]\nU --- D\nend\nsubgraph PAT[Personal Autonomy Team PAT-N]\nPTank[Tank<br/>Safety]\nPDps[DPS<br/>Reasoner]\nPHeal[Healer<br/>Memory]\nPSupp[Support<br/>RAG]\nend\nsubgraph SATC[SAT High Council]\nSATCEO[SAT-CEO]\nCE0[EGO-7]\nCPX[PXS-7]\nCAML[AML-7]\nCKNM[KNM-7]\nCRCE[RCE-7]\nCIRP[IRP-7]\nCTTM[TTM-7]\nend\nsubgraph SATD[SAT Departments]\nEGO[EGO-7<br/>Growth]\nPXS[PXS-7<br/>Product]\nAML[AML-7<br/>Alpha]\nKNM[KNM-7<br/>Media]\nRCE[RCE-7<br/>Risk]\nIRP[IRP-7<br/>Infra]\nTTM[TTM-7<br/>Treasury]\nend\nsubgraph CORE[Core Services]\nLLM[LLM / MoE]\nKG[Knowledge Graph]\nPOI[PoI Engine]\nBG[BlockGraph]\nRP[Resource Pool]\nend\nsubgraph VALUE[Value & Impact]\nTOK[Dual Tokens<br/>SEED/BLOOM]\nIMP[Impact Ledger]\nend\nU -->|"tasks"| PAT\nPAT -->|"requests"| SATC\nSATC --> SATD\nSATD --> CORE\nCORE --> VALUE\nVALUE -->|"rewards"| U\nPAT -->|"attestations"| POI\nPOI --> BG\nBG --> TOK` },
            d1: { title: "Layered System Architecture", desc: "The L0–L3 stack: Network, Ledger, Intelligence, and Crown Proof.", code: `flowchart TB\nsubgraph L0[Layer 0 – Network]\nNET[Secure P2P Network<br/>libp2p / QUIC]\nNODES[Node0 + NodeN Fabric]\nNET --- NODES\nend\nsubgraph L1[Layer 1 – Ledger & PoI]\nBG[BlockGraph / DAG]\nPOI[PoI Engine]\nTOK[Dual Tokens]\nPOI --> BG --> TOK\nend\nsubgraph L2[Layer 2 – Intelligence]\nsubgraph CORE[Core Components]\nLLM[LLM Engine]\nMEM[Memory Systems]\nPOL[Policy AEGIS]\nSELF[Self-Play]\nend\nPATL[PAT Teams]\nSATL[SAT-49 Team]\nPATL --> CORE\nSATL --> CORE\nend\nsubgraph L3[Layer 3 – Governance & Crown]\nGOV[Governance Flow]\nCROWN[Crown Proof Chain]\nIDEO[Ideology & Spec]\nGOV --> CROWN\nIDEO --> POL\nIDEO --> CROWN\nend\nL0 --> L1 --> L2 --> L3\nPATL -->|PoI| POI\nSATL -->|Changes| GOV\nCROWN --> BG` },
            d2: { title: "Node Identity & Lifecycle", desc: "How a human becomes a Node, generates PoI, and receives rewards.", code: `flowchart LR\nU[Human User] --> ONB[Onboarding & Pledge]\nONB -->|"assign NodeID"| NODE1[NodeN<br/>Identity & Keys]\nNODE1 --> PATN[Attach PAT-N Team]\nNODE1 --> DEV[Install Client]\nDEV --> RP[Register to Pool]\nPATN --> ACT[Daily Actions]\nACT --> POI_BUNDLE[Generate PoI Bundle]\nPOI_BUNDLE --> POIENG[PoI Engine]\nPOIENG --> LEDGER[BlockGraph Ledger]\nLEDGER --> REWARD[SEED/BLOOM Rewards]\nREWARD --> NODE1` },
            d3: { title: "Node-0 Agent Hierarchy", desc: "The full hierarchy: 3 Supreme Council, 1 Alpha, 5 Meta, 20 Workers.", code: `flowchart TB\nsubgraph L4[Level 4 – SUPREME COUNCIL]\nC1[Council 1]\nC2[Council 2]\nC3[Council 3]\nend\nsubgraph L3[Level 3 – ALPHA]\nA[ALPHA Coordinator]\nend\nsubgraph L2[Level 2 – META]\nM1[META M1]\nM2[META M2]\nM3[META M3]\nM4[META M4]\nM5[META M5]\nend\nsubgraph L1[Level 1 – WORKERS]\nW1[W1]\nW2[W2]\nW3[W3]\nW4[W4]\nW5[W5]\nW6[W6]\nW7[W7]\nW8[W8]\nW9[W9]\nW10[W10]\nW11[W11]\nW12[W12]\nW13[W13]\nW14[W14]\nW15[W15]\nW16[W16]\nW17[W17]\nW18[W18]\nW19[W19]\nW20[W20]\nend\nC1 & C2 & C3 --> A\nA --> M1 & M2 & M3 & M4 & M5\nM1 --> W1 & W2 & W3 & W4\nM2 --> W5 & W6 & W7 & W8\nM3 --> W9 & W10 & W11 & W12\nM4 --> W13 & W14 & W15 & W16\nM5 --> W17 & W18 & W19 & W20` },
            d4: { title: "SAT-49 Company Structure", desc: "7 Departments, 7 CEOs, 1 SAT-CEO. The operational brain.", code: `flowchart TB\nSATCEO[SAT-CEO]\nsubgraph DEPTS[7 Departments SAT-49]\nEGO[EGO-7<br/>Growth]\nPXS[PXS-7<br/>Product]\nAML[AML-7<br/>Alpha]\nKNM[KNM-7<br/>Media]\nRCE[RCE-7<br/>Risk]\nIRP[IRP-7<br/>Infra]\nTTM[TTM-7<br/>Treasury]\nend\nSATCEO --> EGO & PXS & AML & KNM & RCE & IRP & TTM\nsubgraph NOTE[Note]\nN1[Internal agents are closed loops]\nN2[Only Dept CEOs talk upwards]\nend` },
            d5: { title: "Governance & Crown Pipeline", desc: "Idea to Crown Proof: The rigid gates and checks.", code: `flowchart LR\nsubgraph SAT[SAT Side]\nDEPT[Dept CEO]\nCP[Change Package]\nDEPT --> CP --> SATCEO2[SAT-CEO Sign]\nend\nSATCEO2 --> GOV_REG[Register Proposal]\nsubgraph GOV[Governance Gates]\nGOV_VOTE[Token Voting]\nSHADOW[Gate 1: Shadow]\nCANARY[Gate 2: Canary]\nFULL[Gate 3: Rollout]\nGOV_VOTE --> SHADOW --> CANARY --> FULL\nend\nGOV_REG --> GOV_VOTE\nFULL --> CROWN_REQ[Crown Review]\nsubgraph CROWN[Crown Proof Chain]\nMATH[Math]\nLOGIC[Logic]\nSAFETY[Safety AEGIS]\nSTATS[Statistics]\nETHICS[Ethics]\nPOI_IMPACT[PoI Impact]\nMATH & LOGIC & SAFETY & STATS & ETHICS & POI_IMPACT --> VERDICT[Crown Verdict]\nend\nCROWN_REQ --> CROWN\nVERDICT -->|ACCEPT| ENACT[Enactment]\nVERDICT -->|REJECT| BACK[Revision]\nENACT --> BG2[BlockGraph Update]` },
            d6: { title: "Runtime Architecture v2", desc: "Users -> Frontend -> Rust Core -> K8s -> Ledger.", code: `flowchart TB\nU[Users]\nsubgraph FE[Frontend Next.js]\nWEB[apps/web]\nUI[pkg/ui]\nCLIENT[pkg/client]\nWEB --> UI\nWEB --> CLIENT\nend\nU --> WEB\nCLIENT --> VALAPI[Validation API]\nCLIENT --> CORESVC[Core Services Rust]\nsubgraph K8S[Kubernetes Cluster]\nARGO[Argo Rollouts]\nOBS[Prometheus]\nRBAC[RBAC Genesis]\nend\nVALAPI --> K8S\nCORESVC --> K8S\nsubgraph CICD[CI/CD]\nTESTS[Rust/Jest Tests]\nSUPPLY[SBOM / Cosign]\nend\nCICD --> K8S\nK8S --> BGLEDGER[BlockGraph Ledger]` },

        // === 2. MERMAID CONFIGURATION (IHSAN THEME) ===
        mermaid.initialize({
            startOnLoad: false,
            securityLevel: 'loose',
            theme: 'base',
            themeVariables: {
                primaryColor: '#0A1628',

                secondaryBorderColor: '#B08D45',
                tertiaryColor: '#1A2942',
                tertiaryTextColor: '#D4B875',
                tertiaryBorderColor: '#8A6B2E',
                lineColor: '#C9A962',
                edgeLabelBackground: '#050B14',
                clusterBkg: 'rgba(10, 22, 40, 0.3)',
                clusterBorder: '#C9A962',
                fontFamily: 'Inter, sans-serif',
                fontSize: '13px',
                activeColor: '#4CAF50',
                doneColor: '#2196F3',
                critColor: '#FF9800',
                todoColor: '#9C27B0'
            },
            flowchart: {
                curve: 'basis',
                htmlLabels: true,
                padding: 20,
                nodeSpacing: 60,
                rankSpacing: 80,
                diagramPadding: 40,
                useMaxWidth: false
            },
            themeCSS: `
                .node rect, .node circle, .node polygon { stroke-width: 2px; filter: drop-shadow(0 4px 6px rgba(0, 0, 0, 0.3)); }
                .cluster rect { stroke-width: 1.5px; stroke-dasharray: 5, 3; rx: 8px; }
                .edgePath path { stroke-width: 1.5px; filter: drop-shadow(0 2px 4px rgba(201, 169, 98, 0.2)); }
                .arrowheadPath { fill: #C9A962; stroke: #C9A962; }
                .edgeLabel { background-color: rgba(5, 11, 20, 0.9); border-radius: 4px; padding: 4px 8px; font-size: 11px; color: #E6D5A6; }
                .nodeLabel { color: #F8F6F1; line-height: 1.4; }
            `
        });

        // === 3. CORE LOGIC ===
        let zoomLevel = 1;
        let currentDiagramId = 'd0';

        // Keyboard Shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
            const key = e.key.toLowerCase();
            
            // Numbers 0-7
            if (key >= '0' && key <= '7') {
                const id = 'd' + key;
                if (diagrams[id]) loadDiagram(id);
            }
            // Zoom
            else if (key === '=' || key === '+') { e.preventDefault(); zoomIn(); }
            else if (key === '-' || key === '_') { e.preventDefault(); zoomOut(); }
            // Reset
            else if (key === 'r') { e.preventDefault(); resetZoom(); }
            // Export
            else if (key === 'e') { e.preventDefault(); exportSVG(); }
            // Help
            else if (key === '?') { e.preventDefault(); showKeyboardHelp(); }
        });

        async function loadDiagram(id) {
            currentDiagramId = id;
            
            // Update UI
            document.querySelectorAll('.nav-item').forEach(el => {
                el.classList.remove('active');
                el.setAttribute('aria-selected', 'false');
            });
            const activeBtn = document.getElementById('btn-' + id);
            if (activeBtn) {
                activeBtn.classList.add('active');
                activeBtn.setAttribute('aria-selected', 'true');
            }
            
            const data = diagrams[id];
            document.getElementById('diagram-title').innerText = data.title;
            document.getElementById('diagram-desc').innerText = data.desc;
            
            // Prepare Print Title
            document.querySelector('main').setAttribute('data-diagram-title', data.title);

            // Update Metadata
            updateMetadata(id);

            const output = document.getElementById('mermaid-output');
            const loader = document.getElementById('loader');

            // Show Loader
            loader.style.opacity = '1';
            loader.style.pointerEvents = 'auto';
            
            // Reset Zoom
            resetZoom(false); // false = don't show notification

            // Close mobile menu if open
            if(window.innerWidth < 768) {
                document.querySelector('aside').classList.remove('mobile-open');
                document.getElementById('mobile-overlay').classList.remove('active');
            }

            setTimeout(async () => {
                try {
                    output.innerHTML = '';
                    const { svg } = await mermaid.render('graphDiv', data.code);
                    output.innerHTML = svg;
                    
                    const svgElement = output.querySelector('svg');
                    if (svgElement) {
                        svgElement.style.maxWidth = '100%';
                        svgElement.style.height = 'auto';
                        svgElement.setAttribute('role', 'img');
                        svgElement.setAttribute('aria-label', data.title);
                    }
                } catch (e) {
                    console.error(e);
                    output.innerHTML = '<div class="text-red-500 font-mono p-4 border border-red-500/50 bg-red-900/20 rounded">Error rendering diagram. Check console.</div>';
                } finally {
                    loader.style.opacity = '0';
                    loader.style.pointerEvents = 'none';
                }
            }, 300);
        }

        function updateMetadata(id) {
            // Simulated unique hashes based on diagram ID for demonstration
            const metaMap = {
                d0: { hash: '0xA1B2C3D4', status: 'GENESIS_VERIFIED', layers: 'L0-L3' },
                d1: { hash: '0xE5F6A7B8', status: 'CROWN_SEALED', layers: 'L0-L3+Crown' },
                d2: { hash: '0xC9D0E1F2', status: 'POI_VALIDATED', layers: 'L1+L2' },
                d3: { hash: '0xF3A4B5C6', status: 'HIERARCHY_LOCKED', layers: 'Agent System' },
                d4: { hash: '0xD7E8F9A0', status: 'SAT49_SEALED', layers: 'Governance' },
                d5: { hash: '0xB1C2D3E4', status: 'PIPELINE_VERIFIED', layers: 'Gov+Crown' },
                d6: { hash: '0xF5A6B7C8', status: 'RUNTIME_DEPLOYED', layers: 'Infrastructure' },
                d7: { hash: '0xE9F0A1B2', status: 'CICD_LOCKED', layers: 'DevOps' }
            };
            const meta = metaMap[id] || { hash: 'UNKNOWN', status: 'DRAFT', layers: '-' };
            
            const footer = document.getElementById('metadata-footer');
            footer.innerHTML = `
                <div class="space-y-1">
                    <div class="flex justify-between"><span class="text-gold-500/50">HASH:</span> <span>${meta.hash}</span></div>
                    <div class="flex justify-between"><span class="text-gold-500/50">STATUS:</span> <span class="text-green-400">${meta.status}</span></div>
                    <div class="flex justify-between"><span class="text-gold-500/50">LAYERS:</span> <span>${meta.layers}</span></div>
                    <div class="flex justify-between"><span class="text-gold-500/50">ZOOM:</span> <span id="zoom-val">100%</span></div>
                </div>
            `;
        }

        function zoomIn() {
            zoomLevel = Math.min(zoomLevel + 0.1, 3);
            applyZoom();
        }

        function zoomOut() {
            zoomLevel = Math.max(zoomLevel - 0.1, 0.5);
            applyZoom();
        }

        function resetZoom(notify = true) {
            zoomLevel = 1;
            applyZoom();
            if(notify) showNotification('🔄 Zoom reset to 100%');
        }

        function applyZoom() {
            document.getElementById('mermaid-output').style.transform = `scale(${zoomLevel})`;
            const zoomVal = document.getElementById('zoom-val');
            if (zoomVal) zoomVal.innerText = Math.round(zoomLevel * 100) + '%';
        }

        function exportSVG() {
            const output = document.getElementById('mermaid-output');
            const svg = output.querySelector('svg');
            if (!svg) {
                showNotification('No diagram loaded.', 'error');
                return;
            }
            
            const svgClone = svg.cloneNode(true);
            const title = document.getElementById('diagram-title').innerText;
            
            // Add Metadata
            svgClone.setAttribute('data-bizra-diagram', currentDiagramId);
            svgClone.setAttribute('data-export-timestamp', new Date().toISOString());
            svgClone.setAttribute('xmlns', 'http://www.w3.org/2000/svg');

            // Inject Fonts/Styles for Portability
            const styleElement = document.createElementNS('http://www.w3.org/2000/svg', 'style');
            styleElement.textContent = `
                @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
                text { font-family: 'Inter', sans-serif; }
            `;
            svgClone.insertBefore(styleElement, svgClone.firstChild);
            
            const serializer = new XMLSerializer();
            const svgString = serializer.serializeToString(svgClone);
            const blob = new Blob([svgString], { type: 'image/svg+xml;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            
            const a = document.createElement('a');
            a.download = `bizra-${currentDiagramId}-${title.toLowerCase().replace(/[^a-z0-9]/g, '-')}-${Date.now()}.svg`;
            a.href = url;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            
            showNotification('✅ SVG exported successfully', 'success');
        }

        function toggleMobileSidebar() {
            const sidebar = document.querySelector('aside');
            const overlay = document.getElementById('mobile-overlay');
            sidebar.classList.toggle('mobile-open');
            overlay.classList.toggle('active');
        }

        function showNotification(message, type = 'info') {
            const notif = document.createElement('div');
            const colorClass = type === 'success' ? 'bg-green-600' : (type === 'error' ? 'bg-red-600' : 'bg-blue-600');
            notif.className = `fixed bottom-6 right-6 px-4 py-3 rounded-lg shadow-2xl z-50 transition-all duration-300 ${colorClass} text-white text-xs font-mono font-medium opacity-0 translate-y-4`;
            notif.textContent = message;
            document.body.appendChild(notif);
            
            // Animate in
            requestAnimationFrame(() => {
                notif.classList.remove('opacity-0', 'translate-y-4');
            });
            
            // Remove
            setTimeout(() => {
                notif.classList.add('opacity-0', 'translate-y-4');
                setTimeout(() => notif.remove(), 300);
            }, 3000);
        }

        function showKeyboardHelp() {
            const helpText = `
📋 KEYBOARD SHORTCUTS
---------------------
0-7 : Switch Diagrams
+/- : Zoom In/Out
 R  : Reset Zoom
 E  : Export SVG
 ?  : Show Help
            `;
            alert(helpText);
        }

        // Initial Load
        window.addEventListener('load', () => {
            loadDiagram('d0');
        });

    </script>
</body>
</html>
